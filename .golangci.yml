linters:
  enable:
    - errcheck
    - unused
    - govet
    - staticcheck

linters-settings:
  errcheck:
    # fmt.Sscanf: format is a controlled literal; caller uses the scanned value directly
    # os.File.Seek: offset is immediately re-read via SeekCurrent after the call
    # fsnotify.Watcher.Add: re-watch after log rotation; watcher remains active on failure
    exclude-functions:
      - fmt.Sscanf
      - (os.File).Seek
      - (github.com/fsnotify/fsnotify.Watcher).Add

issues:
  exclude-rules:
    # tablewriter Append/Render write to an io.Writer (stdout/stderr);
    # errors are non-recoverable and intentionally ignored here.
    - linters: [errcheck]
      text: "Error return value of `.*\\.(Append|Render)` is not checked"

    # Ignore all errcheck issues in test files
    - path: _test\.go
      linters: [errcheck]
